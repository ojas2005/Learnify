# Gateway Service
- apiVersion: apps/v1
  kind: Deployment
  metadata:
    name: gateway-service
    labels:
      app: gateway
  spec:
    replicas: 1
    selector:
      matchLabels:
        app: gateway
    template:
      metadata:
        labels:
          app: gateway
      spec:
        containers:
        - name: gateway
          image: gateway-service:latest
          ports:
          - containerPort: 8080
          env:
          - name: ReverseProxy__Clusters__identity-cluster__Destinations__destination1__Address
            value: "http://identity-service:8080"
          - name: ReverseProxy__Clusters__courses-cluster__Destinations__destination1__Address
            value: "http://courses-service:8080"
          - name: ReverseProxy__Clusters__curriculum-cluster__Destinations__destination1__Address
            value: "http://curriculum-service:8080"
          - name: ReverseProxy__Clusters__exams-cluster__Destinations__destination1__Address
            value: "http://exams-service:8080"
          - name: ReverseProxy__Clusters__registration-cluster__Destinations__destination1__Address
            value: "http://registration-service:8080"
          - name: ReverseProxy__Clusters__reviews-cluster__Destinations__destination1__Address
            value: "http://reviews-service:8080"
          - name: ReverseProxy__Clusters__tracking-cluster__Destinations__destination1__Address
            value: "http://tracking-service:8080"
          - name: ReverseProxy__Clusters__analytics-cluster__Destinations__destination1__Address
            value: "http://analytics-service:8080"
- apiVersion: v1
  kind: Service
  metadata:
    name: gateway-service
  spec:
    selector:
      app: gateway
    ports:
    - protocol: TCP
      port: 8080
      targetPort: 8080
