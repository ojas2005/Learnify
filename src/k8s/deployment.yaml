apiVersion: v1
kind: List
items:
# Identity Service
- apiVersion: apps/v1
  kind: Deployment
  metadata:
    name: identity-service
    labels:
      app: identity
  spec:
    replicas: 1
    selector:
      matchLabels:
        app: identity
    template:
      metadata:
        labels:
          app: identity
      spec:
        containers:
        - name: identity
          image: identity-service:latest
          ports:
          - containerPort: 8080
          envFrom:
          - secretRef:
              name: learnify-secrets
          env:
          - name: Gateway__Url
            value: "http://gateway-service:8080"
- apiVersion: v1
  kind: Service
  metadata:
    name: identity-service
  spec:
    selector:
      app: identity
    ports:
    - protocol: TCP
      port: 8080
      targetPort: 8080

